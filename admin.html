<!DOCTYPE html>
<html lang="ru" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель | Москва ЛАЙВ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link href="styles.css" rel="stylesheet" />
  <style>
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #10b981;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    .toast.error { background: #ef4444; }
    .toast.sync { background: #3b82f6; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    input:checked + .toggle-slider {
      background-color: #22c55e;
    }
    input:checked + .toggle-slider:before {
      transform: translateX(26px);
    }
  </style>
</head>
<body class="transition-all">
  <div class="flex max-w-6xl mx-auto bg-white dark:bg-gray-800 p-6 rounded-xl shadow space-x-6 text-black dark:text-white min-h-[600px]">
    <aside class="w-52 bg-gray-100 dark:bg-gray-900 rounded-lg p-4 flex flex-col space-y-3">
      <h1 class="text-xl font-bold text-orange-400 text-center mb-2">🔐 Админ-панель</h1>
      
      <div class="border-t border-b border-gray-600 py-3 my-2">
        <p class="text-sm font-semibold mb-2 text-center">👁️ Видимость тестов</p>
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm">📋 ППО</span>
          <label class="toggle-switch">
            <input type="checkbox" id="togglePpo" onchange="toggleTestVisibility('ppo', this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm">📜 Устав</span>
          <label class="toggle-switch">
            <input type="checkbox" id="toggleUstav" onchange="toggleTestVisibility('ustav', this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-sm">👔 Руководство</span>
          <label class="toggle-switch">
            <input type="checkbox" id="toggleLeadership" onchange="toggleTestVisibility('leadership', this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      
      <button onclick="switchSet('ppoQuestions')" id="btn-ppoQuestions" class="px-3 py-2 rounded text-white bg-blue-500 hover:bg-blue-600 text-sm">📋 PPO Выбор</button>
      <button onclick="switchSet('ppoWrittenQuestions')" id="btn-ppoWrittenQuestions" class="px-3 py-2 rounded text-white bg-green-500 hover:bg-green-600 text-sm">✍️ PPO Письменные</button>
      <button onclick="switchSet('ustavQuestions')" id="btn-ustavQuestions" class="px-3 py-2 rounded text-white bg-purple-500 hover:bg-purple-600 text-sm">📜 Устав</button>
      <hr class="my-2 border-gray-600">
      <button onclick="exportAllData()" class="px-3 py-2 rounded text-white bg-yellow-600 hover:bg-yellow-700 text-sm">💾 Экспорт</button>
      <label class="px-3 py-2 rounded text-white bg-gray-600 hover:bg-gray-700 text-sm text-center cursor-pointer">
        📂 Импорт
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importAllData(this)">
      </label>
      <button onclick="resetToDefault()" class="px-3 py-2 rounded text-white bg-red-600 hover:bg-red-700 text-sm">🔄 Сбросить</button>
      <input id="pw" type="password" placeholder="Пароль" class="mt-auto p-2 bg-gray-200 dark:bg-gray-700 rounded text-center text-sm" />
      <button onclick="toggleTheme()" class="mt-2 text-2xl self-center" id="theme-icon">🌙</button>
    </aside>
    <main class="flex-1 bg-gray-50 dark:bg-gray-900 rounded-lg p-6 flex flex-col">
      <div id="panel" class="hidden flex flex-col space-y-4">
        <div class="flex gap-2">
          <select id="type" onchange="toggleType()" class="p-2 bg-gray-200 dark:bg-gray-700 rounded flex-1">
            <option value="multiple">Выбор ответа</option>
            <option value="written">Письменный ответ</option>
          </select>
          <button onclick="clearForm()" class="bg-gray-500 hover:bg-gray-600 text-white px-3 rounded text-sm">🗑 Очистить</button>
        </div>
        <textarea id="q" placeholder="Вопрос" rows="2" class="p-2 bg-gray-200 dark:bg-gray-700 rounded"></textarea>
        <div id="optionFields" class="flex flex-col space-y-2">
          <input id="a1" placeholder="Вариант 1" class="p-2 bg-gray-200 dark:bg-gray-700 rounded" />
          <input id="a2" placeholder="Вариант 2" class="p-2 bg-gray-200 dark:bg-gray-700 rounded" />
          <input id="a3" placeholder="Вариант 3" class="p-2 bg-gray-200 dark:bg-gray-700 rounded" />
        </div>
        <input id="correct" placeholder="Правильный ответ" class="p-2 bg-gray-200 dark:bg-gray-700 rounded" />
        <button id="addBtn" onclick="addQuestion()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded text-white w-32">➕ Добавить</button>
        
        <div class="flex justify-between items-center mt-4">
          <h2 class="font-bold">Список вопросов</h2>
          <span id="questionCount" class="text-sm text-gray-500"></span>
        </div>
        <div id="list" class="max-h-[400px] overflow-y-auto text-sm space-y-2 pr-1"></div>
      </div>
    </main>
  </div>

<script>
// ========== FIREBASE КОНФИГ ==========
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCuOIt7wMUrN8vu9RQqivNj9w3CdFitrqE",
  authDomain: "moscow-live-tests.firebaseapp.com",
  projectId: "moscow-live-tests",
  storageBucket: "moscow-live-tests.firebasestorage.app",
  messagingSenderId: "956332293918",
  appId: "1:956332293918:web:e7f66986cca2a30474130f"
};
// ====================================

const PASSWORD = "admin2024";
let currentSet = "ppoQuestions";
let questions = [];
let editingIndex = -1;
let db = null;
let isSyncingFromFirebase = false; // Чтобы не было циклической синхронизации

const DEFAULTS = {
  ppoQuestions: [
    { q: "Как правильно начать объявление?", options: ["а) \"продам машину\"", "б) \"Продам а/м\"", "в) \"ПРОДАМ ТАЧКУ\""], answer: "б) \"Продам а/м\"" },
    { q: "Можно ли писать цену как «5кк»?", options: ["а) Да", "б) Нет"], answer: "б) Нет" },
    { q: "Обязательно ли указывать «Цена:» для продажи?", options: ["а) Да", "б) Нет"], answer: "а) Да" },
    { q: "Как обозначить авто с полным тюнингом?", options: ["а) FT", "б) ET"], answer: "а) FT" }
  ],
  ppoWrittenQuestions: [
    { q: "Продам а/м бмв м3", answer: "Не корректное объявление." },
    { q: "Куплю Майб Г цена договорная", answer: "Не корректное объявление." },
    { q: "куплю саблю", answer: "Куплю клад \"Сабля\". Бюджет: Свободный." }
  ],
  ustavQuestions: [
    { q: "Кто имеет право вносить изменения в Устав?", options: ["А) Любой сотрудник", "Б) Только Директор", "В) Отдел Кадров"], answer: "Б" },
    { q: "Какие территории закрыты для гражданских?", options: ["А) Кабинет Директора", "Б) Второй, третий этаж и крыша", "В) Весь офис"], answer: "Б" }
  ]
};

function showToast(msg, isError = false) {
  const toast = document.createElement('div');
  toast.className = `toast ${isError ? 'error' : ''}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function toggleTheme() {
  const html = document.documentElement;
  html.classList.toggle('dark');
  html.classList.toggle('light');
  localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
}

(function() {
  const saved = localStorage.getItem('theme');
  const html = document.documentElement;
  if (saved === 'dark') { html.classList.add('dark'); html.classList.remove('light'); }
  else { html.classList.add('light'); html.classList.remove('dark'); }
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = saved === 'dark' ? '☀️' : '🌙';
})();

// ========== FIREBASE ==========
function initFirebase() {
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
    db = firebase.database();
    showToast('✅ Firebase подключен');
    
    // Загружаем данные и настраиваем автоматические слушатели
    loadAllFromFirebase();
    setupAutoSync();
  } catch(e) {
    console.error(e);
    showToast('❌ Ошибка Firebase', true);
  }
}

function setupAutoSync() {
  if (!db) return;
  
  // Автоматическая синхронизация видимости тестов
  db.ref('settings/testVisibility').on('value', (snapshot) => {
    if (isSyncingFromFirebase) return;
    isSyncingFromFirebase = true;
    
    const data = snapshot.val();
    if (data) {
      localStorage.setItem('testVisibility', JSON.stringify(data));
      updateToggleButtons();
      showToast('🔄 Настройки видимости обновлены');
    }
    isSyncingFromFirebase = false;
  });
  
  // Автоматическая синхронизация вопросов для каждого набора
  const sets = ['ppoQuestions', 'ppoWrittenQuestions', 'ustavQuestions'];
  sets.forEach(setName => {
    db.ref(`questions/${setName}`).on('value', (snapshot) => {
      if (isSyncingFromFirebase) return;
      isSyncingFromFirebase = true;
      
      const data = snapshot.val();
      if (data && Array.isArray(data)) {
        // Сохраняем в localStorage
        localStorage.setItem(setName, JSON.stringify(data));
        
        // Если это текущий набор, обновляем отображение
        if (currentSet === setName) {
          questions = data;
          renderList();
          document.getElementById('questionCount').innerText = `${questions.length} вопросов`;
          showToast(`🔄 Вопросы "${setName}" обновлены автоматически`);
        }
      }
      isSyncingFromFirebase = false;
    });
  });
}

async function loadAllFromFirebase() {
  if (!db) return;
  isSyncingFromFirebase = true;
  
  try {
    // Загружаем видимость
    const visSnapshot = await db.ref('settings/testVisibility').once('value');
    if (visSnapshot.exists()) {
      localStorage.setItem('testVisibility', JSON.stringify(visSnapshot.val()));
      updateToggleButtons();
    } else {
      const defaultVis = { ppo: true, ustav: true, leadership: true };
      await db.ref('settings/testVisibility').set(defaultVis);
      localStorage.setItem('testVisibility', JSON.stringify(defaultVis));
      updateToggleButtons();
    }
    
    // Загружаем вопросы
    const sets = ['ppoQuestions', 'ppoWrittenQuestions', 'ustavQuestions'];
    for (const setName of sets) {
      const snapshot = await db.ref(`questions/${setName}`).once('value');
      if (snapshot.exists()) {
        const data = snapshot.val();
        localStorage.setItem(setName, JSON.stringify(data));
        if (currentSet === setName) {
          questions = data;
          renderList();
          document.getElementById('questionCount').innerText = `${questions.length} вопросов`;
        }
      } else {
        await db.ref(`questions/${setName}`).set(DEFAULTS[setName]);
        localStorage.setItem(setName, JSON.stringify(DEFAULTS[setName]));
        if (currentSet === setName) {
          questions = DEFAULTS[setName];
          renderList();
          document.getElementById('questionCount').innerText = `${questions.length} вопросов`;
        }
      }
    }
    showToast('☁️ Данные синхронизированы');
  } catch(e) {
    console.error(e);
  } finally {
    isSyncingFromFirebase = false;
  }
}

async function pushToFirebase(setName, data) {
  if (!db || isSyncingFromFirebase) return;
  try {
    await db.ref(`questions/${setName}`).set(data);
  } catch(e) {
    console.error('Ошибка отправки в Firebase:', e);
  }
}

// ========== УПРАВЛЕНИЕ ==========
function loadTestVisibility() {
  const saved = localStorage.getItem('testVisibility');
  const defaults = { ppo: true, ustav: true, leadership: true };
  if (saved) return { ...defaults, ...JSON.parse(saved) };
  return defaults;
}

function saveTestVisibility(settings) {
  localStorage.setItem('testVisibility', JSON.stringify(settings));
  if (db && !isSyncingFromFirebase) {
    db.ref('settings/testVisibility').set(settings);
  }
}

function toggleTestVisibility(test, isVisible) {
  const settings = loadTestVisibility();
  settings[test] = isVisible;
  saveTestVisibility(settings);
  const names = { ppo: 'Тест ППО', ustav: 'Тест Устава', leadership: 'Тест Руководства' };
  showToast(`${names[test]} ${isVisible ? 'показан' : 'скрыт'}`);
}

function updateToggleButtons() {
  const settings = loadTestVisibility();
  const ppo = document.getElementById('togglePpo');
  const ustav = document.getElementById('toggleUstav');
  const leadership = document.getElementById('toggleLeadership');
  if (ppo) ppo.checked = settings.ppo;
  if (ustav) ustav.checked = settings.ustav;
  if (leadership) leadership.checked = settings.leadership;
}

function renderList() {
  const list = document.getElementById('list');
  if (!list) return;
  list.innerHTML = '';
  if (!questions || !questions.length) {
    list.innerHTML = '<div class="text-center text-gray-500 p-4">Нет вопросов. Добавьте первый!</div>';
    return;
  }
  questions.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'bg-gray-100 dark:bg-gray-800 p-2 rounded mb-2';
    const preview = item.q.length > 60 ? item.q.substring(0, 60) + '...' : item.q;
    el.innerHTML = `
      <div class="flex justify-between items-start">
        <div class="flex-1">
          <b>${i+1}.</b> ${preview}
          <div class="text-xs text-gray-500">${item.options ? '📌 Выбор ответа' : '✍️ Письменный'}</div>
        </div>
        <div class="flex gap-1">
          <button onclick="editQuestion(${i})" class="text-blue-500 text-sm px-2">✏️</button>
          <button onclick="del(${i})" class="text-red-500 text-sm px-2">🗑️</button>
        </div>
      </div>
    `;
    list.appendChild(el);
  });
}

function saveQuestions() {
  // Сохраняем в localStorage
  localStorage.setItem(currentSet, JSON.stringify(questions));
  document.getElementById('questionCount').innerText = `${questions.length} вопросов`;
  renderList();
  showToast(`✅ Сохранено ${questions.length} вопросов`);
  
  // Автоматически отправляем в Firebase
  pushToFirebase(currentSet, questions);
}

function addQuestion() {
  const type = document.getElementById('type').value;
  const q = document.getElementById('q').value.trim();
  const correct = document.getElementById('correct').value.trim();
  if (!q) { showToast('Введите вопрос!', true); return; }
  if (!correct) { showToast('Введите ответ!', true); return; }
  
  let questionObj;
  if (type === 'multiple') {
    const a1 = document.getElementById('a1').value.trim();
    const a2 = document.getElementById('a2').value.trim();
    const a3 = document.getElementById('a3').value.trim();
    if (!a1 || !a2 || !a3) { showToast('Заполните варианты!', true); return; }
    questionObj = { q, options: [a1, a2, a3], answer: correct };
  } else {
    questionObj = { q, answer: correct };
  }
  
  if (editingIndex >= 0) {
    questions[editingIndex] = questionObj;
    editingIndex = -1;
    document.getElementById('addBtn').textContent = '➕ Добавить';
    showToast('✅ Вопрос обновлён');
  } else {
    questions.push(questionObj);
    showToast('✅ Вопрос добавлен');
  }
  saveQuestions();
  clearForm();
}

function clearForm() {
  document.getElementById('q').value = '';
  document.getElementById('a1').value = '';
  document.getElementById('a2').value = '';
  document.getElementById('a3').value = '';
  document.getElementById('correct').value = '';
  document.getElementById('type').value = 'multiple';
  toggleType();
  editingIndex = -1;
  document.getElementById('addBtn').textContent = '➕ Добавить';
}

function editQuestion(i) {
  const q = questions[i];
  document.getElementById('q').value = q.q;
  document.getElementById('correct').value = q.answer;
  if (q.options) {
    document.getElementById('type').value = 'multiple';
    toggleType();
    document.getElementById('a1').value = q.options[0] || '';
    document.getElementById('a2').value = q.options[1] || '';
    document.getElementById('a3').value = q.options[2] || '';
  } else {
    document.getElementById('type').value = 'written';
    toggleType();
  }
  editingIndex = i;
  document.getElementById('addBtn').textContent = '📝 Обновить';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function del(i) {
  if (confirm('Удалить вопрос?')) {
    questions.splice(i, 1);
    saveQuestions();
    showToast('🗑️ Вопрос удалён');
  }
}

function toggleType() {
  const type = document.getElementById('type').value;
  const optionFields = document.getElementById('optionFields');
  if (optionFields) optionFields.style.display = type === 'multiple' ? 'flex' : 'none';
}

function switchSet(set) {
  currentSet = set;
  const saved = localStorage.getItem(set);
  if (saved) {
    questions = JSON.parse(saved);
  } else {
    questions = DEFAULTS[set] || [];
  }
  document.getElementById('questionCount').innerText = `${questions.length} вопросов`;
  renderList();
  clearForm();
  
  ['ppoQuestions', 'ppoWrittenQuestions', 'ustavQuestions'].forEach(id => {
    const btn = document.getElementById(`btn-${id}`);
    if (btn) {
      if (id === set) btn.classList.add('ring', 'ring-offset-2', 'ring-orange-400');
      else btn.classList.remove('ring', 'ring-offset-2', 'ring-orange-400');
    }
  });
}

function exportAllData() {
  const data = {
    ppoQuestions: JSON.parse(localStorage.getItem('ppoQuestions') || '[]'),
    ppoWrittenQuestions: JSON.parse(localStorage.getItem('ppoWrittenQuestions') || '[]'),
    ustavQuestions: JSON.parse(localStorage.getItem('ustavQuestions') || '[]'),
    testVisibility: loadTestVisibility()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `moscow_live_backup_${new Date().toISOString().slice(0,19)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 Бэкап скачан');
}

function importAllData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.ppoQuestions) localStorage.setItem('ppoQuestions', JSON.stringify(data.ppoQuestions));
      if (data.ppoWrittenQuestions) localStorage.setItem('ppoWrittenQuestions', JSON.stringify(data.ppoWrittenQuestions));
      if (data.ustavQuestions) localStorage.setItem('ustavQuestions', JSON.stringify(data.ustavQuestions));
      if (data.testVisibility) localStorage.setItem('testVisibility', JSON.stringify(data.testVisibility));
      updateToggleButtons();
      if (currentSet === 'ppoQuestions') questions = data.ppoQuestions || [];
      if (currentSet === 'ppoWrittenQuestions') questions = data.ppoWrittenQuestions || [];
      if (currentSet === 'ustavQuestions') questions = data.ustavQuestions || [];
      renderList();
      document.getElementById('questionCount').innerText = `${questions.length} вопросов`;
      showToast('📂 Импорт выполнен');
      // Автоматически отправляем в Firebase
      if (db && questions.length) {
        pushToFirebase(currentSet, questions);
      }
    } catch(err) {
      showToast('Ошибка импорта', true);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function resetToDefault() {
  if (confirm(`Сбросить все вопросы "${currentSet}" к стандартным?`)) {
    questions = [...DEFAULTS[currentSet]];
    saveQuestions();
    showToast('🔄 Вопросы сброшены');
  }
}

// ВХОД В АДМИНКУ
document.getElementById("pw").addEventListener("change", function(e) {
  if (e.target.value === PASSWORD) {
    document.getElementById("panel").classList.remove("hidden");
    
    Object.keys(DEFAULTS).forEach(key => {
      if (!localStorage.getItem(key)) {
        localStorage.setItem(key, JSON.stringify(DEFAULTS[key]));
      }
    });
    if (!localStorage.getItem('testVisibility')) {
      localStorage.setItem('testVisibility', JSON.stringify({ ppo: true, ustav: true, leadership: true }));
    }
    
    updateToggleButtons();
    switchSet(currentSet);
    showToast('🔓 Добро пожаловать в админ-панель');
    initFirebase();
  } else {
    showToast('❌ Неверный пароль', true);
  }
});
</script>
</body>
</html>
