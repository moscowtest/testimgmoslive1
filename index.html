<!DOCTYPE html>
<html lang="ru" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>МОСКВА ЛАЙВ — Тест</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link href="styles.css" rel="stylesheet">
  <style>
    .admin-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .admin-modal.active { display: flex; }
    .admin-modal-content {
      background: var(--bg-color, #d9e8ff);
      border-radius: 16px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    html.dark .admin-modal-content { background: #1f2937; color: white; }
    .admin-modal-content input {
      width: 100%;
      padding: 10px;
      margin: 15px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .logo-clickable {
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .logo-clickable:active { transform: scale(0.98); }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #10b981;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="absolute top-4 right-4 z-50">
    <button onclick="toggleTheme()" class="text-2xl" id="theme-icon">🌙</button>
  </div>
  <div class="min-h-screen flex flex-col items-center justify-center p-6">
    <img src="logo.png" class="w-48 mb-6 drop-shadow-lg rounded-xl logo-clickable" onclick="onLogoClick()" title="Нажмите 3 раза для входа в админ-панель">
    <h1 class="text-4xl font-bold text-center mb-2">Тест МОСКВА ЛАЙВ</h1>
    <p class="text-center text-lg mb-6">Выберите тест:</p>
    <div id="testButtonsContainer" class="flex flex-col gap-4 w-full max-w-sm">
      <div class="loading-settings">🔄 Загрузка...</div>
    </div>
    <button onclick="sendSuggestion()" class="mt-4 bg-orange-600 text-white py-3 rounded-xl text-center font-semibold shadow hover:bg-orange-700 transition w-full max-w-sm">💡 Предложения или ошибки</button>
  </div>
  <div id="adminModal" class="admin-modal" onclick="if(event.target===this) closeAdminModal()">
    <div class="admin-modal-content">
      <h2 class="text-xl font-bold mb-4">🔐 Вход в админ-панель</h2>
      <input type="password" id="adminPassword" placeholder="Пароль">
      <button onclick="checkAdminPassword()">Войти</button>
      <button onclick="closeAdminModal()" style="background:#6b7280; margin-left:10px;">Отмена</button>
      <div id="adminError" class="text-red-500 text-sm mt-2"></div>
    </div>
  </div>

<script>
// ========== FIREBASE КОНФИГ ==========
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCuOIt7wMUrN8vu9RQqivNj9w3CdFitrqE",
  authDomain: "moscow-live-tests.firebaseapp.com",
  projectId: "moscow-live-tests",
  storageBucket: "moscow-live-tests.firebasestorage.app",
  messagingSenderId: "956332293918",
  appId: "1:956332293918:web:e7f66986cca2a30474130f"
};
// ====================================

let clickCount = 0, clickTimer = null;
let db = null;

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function initFirebase() {
  if (!firebase.apps.length) {
    firebase.initializeApp(FIREBASE_CONFIG);
  }
  db = firebase.database();
  console.log('✅ Firebase подключен');
  
  // Загружаем настройки видимости
  db.ref('settings/testVisibility').once('value').then((snapshot) => {
    if (snapshot.exists()) {
      localStorage.setItem('testVisibility', JSON.stringify(snapshot.val()));
    }
    renderVisibleTests();
  }).catch(() => {
    renderVisibleTests();
  });
  
  // Слушаем изменения видимости в реальном времени
  db.ref('settings/testVisibility').on('value', (snapshot) => {
    if (snapshot.exists()) {
      localStorage.setItem('testVisibility', JSON.stringify(snapshot.val()));
      renderVisibleTests();
      showToast('🔄 Настройки тестов обновлены');
    }
  });
  
  // Фоновое обновление вопросов (для тестов)
  const sets = ['ppoQuestions', 'ppoWrittenQuestions', 'ustavQuestions'];
  sets.forEach(setName => {
    db.ref(`questions/${setName}`).on('value', (snapshot) => {
      const data = snapshot.val();
      if (data && Array.isArray(data)) {
        localStorage.setItem(setName, JSON.stringify(data));
        console.log(`🔄 Вопросы ${setName} обновлены в фоне`);
      }
    });
  });
}

function loadTestVisibility() {
  const saved = localStorage.getItem('testVisibility');
  if (saved) {
    return JSON.parse(saved);
  }
  return { ppo: true, ustav: true, leadership: true };
}

function renderVisibleTests() {
  const visibility = loadTestVisibility();
  const container = document.getElementById('testButtonsContainer');
  if (!container) return;
  
  container.innerHTML = '';
  
  const tests = [
    { id: 'ustav', name: '📜 Тест по Уставу', color: 'blue', url: 'ustav.html' },
    { id: 'ppo', name: '📋 Тест по ППО', color: 'purple', url: 'ppo.html' },
    { id: 'leadership', name: '👔 Тест по Руководству', color: 'green', url: 'leadership.html' }
  ];
  
  let visibleCount = 0;
  tests.forEach(test => {
    if (visibility[test.id]) {
      visibleCount++;
      const btn = document.createElement('a');
      btn.href = test.url;
      btn.className = `bg-${test.color}-600 text-white py-3 rounded-xl text-center font-semibold shadow hover:bg-${test.color}-700 transition`;
      btn.textContent = test.name;
      container.appendChild(btn);
    }
  });
  
  if (visibleCount === 0) {
    const msg = document.createElement('p');
    msg.className = 'text-center text-gray-500 py-8';
    msg.textContent = '⚠️ Все тесты скрыты. Зайдите в админ-панель, чтобы включить их.';
    container.appendChild(msg);
  }
}

function toggleTheme() {
  const html = document.documentElement;
  html.classList.toggle('dark');
  html.classList.toggle('light');
  localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
}

(function() {
  const saved = localStorage.getItem('theme');
  const html = document.documentElement;
  if (saved === 'dark') { html.classList.add('dark'); html.classList.remove('light'); }
  else { html.classList.add('light'); html.classList.remove('dark'); }
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = saved === 'dark' ? '☀️' : '🌙';
})();

function onLogoClick() { 
  clickCount++; 
  if (clickTimer) clearTimeout(clickTimer); 
  clickTimer = setTimeout(() => clickCount = 0, 800); 
  if (clickCount === 3) { 
    clickCount = 0; 
    document.getElementById('adminModal').classList.add('active'); 
  } 
}

function checkAdminPassword() { 
  const password = document.getElementById('adminPassword').value;
  if (password === "admin2024") {
    // Перенаправляем на админ-панель ТОЛЬКО при правильном пароле
    window.location.href = "admin.html";
  } else { 
    document.getElementById('adminError').textContent = "Неверный пароль!"; 
  } 
}

function closeAdminModal() { 
  document.getElementById('adminModal').classList.remove('active'); 
  document.getElementById('adminPassword').value = ''; 
  document.getElementById('adminError').textContent = ''; 
}

function sendSuggestion() { 
  const s = prompt("Ваше предложение или ошибка:"); 
  if (s) alert("Спасибо!"); 
}

document.addEventListener('keydown', (e) => { 
  if (e.key === 'Escape') closeAdminModal(); 
});

document.addEventListener('DOMContentLoaded', initFirebase);
</script>
</body>
</html>
