<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>МОСКВА ЛАЙВ | тесты</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 20% 30%, #0a0a2a, #050510);
      min-height: 100vh;
      color: #fff;
    }
    /* Неоновое свечение */
    .neon-glow {
      text-shadow: 0 0 5px #00d4ff, 0 0 10px #00d4ff, 0 0 20px #00d4ff, 0 0 40px #00d4ff;
    }
    .btn-neon {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #00d4ff;
      color: #00d4ff;
      padding: 14px 28px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }
    .btn-neon:hover {
      background: #00d4ff;
      color: #050510;
      box-shadow: 0 0 30px #00d4ff, 0 0 60px #00d4ff;
      transform: scale(1.05);
    }
    .btn-neon-pink {
      border-color: #ff00d4;
      color: #ff00d4;
      box-shadow: 0 0 10px rgba(255, 0, 212, 0.3);
    }
    .btn-neon-pink:hover {
      background: #ff00d4;
      color: #050510;
      box-shadow: 0 0 30px #ff00d4, 0 0 60px #ff00d4;
    }
    .btn-neon-green {
      border-color: #00ff88;
      color: #00ff88;
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
    }
    .btn-neon-green:hover {
      background: #00ff88;
      color: #050510;
      box-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88;
    }
    .glass-card {
      background: rgba(20, 20, 50, 0.4);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      padding: 32px;
      transition: all 0.3s ease;
    }
    .glass-card:hover {
      border-color: #00d4ff;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
      transform: translateY(-5px);
    }
    .logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #00d4ff, #ff00d4);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }
    .logo:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.8);
    }
    .admin-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .admin-modal.active { display: flex; }
    .admin-modal-content {
      background: rgba(10, 10, 30, 0.95);
      border-radius: 32px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      border: 2px solid #00d4ff;
      box-shadow: 0 0 50px rgba(0, 212, 255, 0.3);
    }
    .admin-modal-content input {
      width: 100%;
      padding: 14px;
      margin: 15px 0;
      border-radius: 60px;
      border: 2px solid #00d4ff;
      background: rgba(0, 0, 0, 0.6);
      color: #00d4ff;
      font-size: 18px;
      text-align: center;
      outline: none;
    }
    .admin-modal-content input:focus {
      box-shadow: 0 0 20px #00d4ff;
    }
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 60px;
      padding: 12px;
      cursor: pointer;
      font-size: 24px;
      z-index: 100;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #00d4ff;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0, 212, 255, 0.3);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="theme-toggle" onclick="toggleTheme()" id="theme-icon">🌙</div>
  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="text-center max-w-md w-full">
      <div class="logo" onclick="onLogoClick()">
        🎮
      </div>
      <h1 class="text-5xl font-extrabold mb-2 neon-glow">МОСКВА ЛАЙВ</h1>
      <p class="text-gray-400 mb-8">Выбери свой путь 🔥</p>
      <div id="testButtonsContainer" class="space-y-4">
        <div class="loading"><div class="loading-spinner"></div>Загрузка...</div>
      </div>
      <button onclick="sendSuggestion()" class="btn-neon btn-neon-pink w-full mt-6">💡 Предложения или ошибки</button>
    </div>
  </div>

  <div id="adminModal" class="admin-modal" onclick="if(event.target===this) closeAdminModal()">
    <div class="admin-modal-content">
      <h2 class="text-2xl font-bold mb-4 neon-glow">🔐 ВХОД В АДМИНКУ</h2>
      <input type="password" id="adminPassword" placeholder="Введите пароль">
      <button onclick="checkFirstPassword()" class="btn-neon w-full">ВОЙТИ</button>
      <div id="adminError" class="text-red-500 text-sm mt-3"></div>
    </div>
  </div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCuOIt7wMUrN8vu9RQqivNj9w3CdFitrqE",
  authDomain: "moscow-live-tests.firebaseapp.com",
  projectId: "moscow-live-tests",
  storageBucket: "moscow-live-tests.firebasestorage.app",
  messagingSenderId: "956332293918",
  appId: "1:956332293918:web:e7f66986cca2a30474130f"
};

const FIRST_PASSWORD = "1495";
const ADMIN_SECRET_URL = "neon-admin-9f3a.html";

let clickCount = 0, clickTimer = null, db = null;

function initFirebase() { if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); }
async function loadVisibility() {
  try { const s = await db.ref('settings/testVisibility').once('value'); if(s.exists()) renderVisibleTests(s.val()); else renderVisibleTests({ ppo: true, ustav: true, leadership: true }); } catch(e){ renderVisibleTests({ ppo: true, ustav: true, leadership: true }); }
  db.ref('settings/testVisibility').on('value', (s) => { if(s.exists()) renderVisibleTests(s.val()); });
}
function renderVisibleTests(v) {
  const vis = v || { ppo: true, ustav: true, leadership: true };
  const c = document.getElementById('testButtonsContainer'); if(!c) return;
  c.innerHTML = '';
  const tests = [
    { id: 'ustav', name: '📜 ТЕСТ УСТАВА', color: 'blue', url: 'ustav.html' },
    { id: 'ppo', name: '📋 ТЕСТ ППО', color: 'pink', url: 'ppo.html' },
    { id: 'leadership', name: '👔 ТЕСТ РУКОВОДСТВА', color: 'green', url: 'leadership.html' }
  ];
  let cnt = 0;
  tests.forEach(t => {
    if(vis[t.id]) {
      cnt++;
      const btn = document.createElement('a');
      btn.href = t.url;
      btn.className = `btn-neon ${t.id === 'ppo' ? 'btn-neon-pink' : (t.id === 'leadership' ? 'btn-neon-green' : '')} w-full block`;
      btn.textContent = t.name;
      c.appendChild(btn);
    }
  });
  if(cnt === 0) c.innerHTML = '<p class="text-center text-gray-400">⚠️ Все тесты скрыты. Зайдите в админку.</p>';
}
function onLogoClick() { clickCount++; if(clickTimer) clearTimeout(clickTimer); clickTimer = setTimeout(() => clickCount = 0, 800); if(clickCount === 3) { clickCount = 0; document.getElementById('adminModal').classList.add('active'); } }
function checkFirstPassword() { if(document.getElementById('adminPassword').value === FIRST_PASSWORD) { window.location.href = ADMIN_SECRET_URL; } else { document.getElementById('adminError').textContent = "Неверный пароль!"; } }
function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); document.getElementById('adminPassword').value = ''; document.getElementById('adminError').textContent = ''; }
function sendSuggestion() { const s = prompt("Ваше предложение или ошибка:"); if(s) alert("Спасибо!"); }
function toggleTheme() { const h = document.documentElement; const isDark = h.classList.contains('dark'); if(isDark) { h.classList.remove('dark'); localStorage.setItem('theme', 'light'); document.getElementById('theme-icon').textContent = '🌙'; } else { h.classList.add('dark'); localStorage.setItem('theme', 'dark'); document.getElementById('theme-icon').textContent = '☀️'; } }
(function() { const s = localStorage.getItem('theme'); if(s === 'dark') { document.documentElement.classList.add('dark'); document.getElementById('theme-icon').textContent = '☀️'; } else { document.documentElement.classList.remove('dark'); document.getElementById('theme-icon').textContent = '🌙'; } })();
document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeAdminModal(); });
initFirebase();
loadVisibility();
</script>
</body>
</html>
