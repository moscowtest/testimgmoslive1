  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      html.classList.toggle('dark');
      html.classList.toggle('light');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
    }

    // On page load, apply saved theme
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const html = document.documentElement;
      if (savedTheme === 'dark') {
        html.classList.add('dark');
        html.classList.remove('light');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = '☀️';
      } else {
        html.classList.add('light');
        html.classList.remove('dark');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = '🌙';
      }
    })();
  </script>
</head>

let timerInterval;
let timeLeft = 1800; // 30 минут в секундах

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 1800;
  updateTimerDisplay();
  updateProgressBar();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    updateProgressBar();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Время вышло!");
      disableTest();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const timerEl = document.getElementById("timer");
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  timerEl.innerHTML = `<span class="mr-1">⏰</span> Осталось времени: <span class="font-mono">${minutes}:${seconds.toString().padStart(2, '0')}</span>`;
}

function updateProgressBar() {
  const progressBar = document.getElementById("progressBar");
  const totalTime = 900;
  const percent = ((totalTime - timeLeft) / totalTime) * 100;
  progressBar.style.width = percent + "%";
}

function disableTest() {
  const inputs = document.querySelectorAll("#testContainer input[type='radio']");
  inputs.forEach(input => input.disabled = true);
  const btn = document.querySelector("button[onclick='checkAnswers()']");
  if (btn) btn.disabled = true;
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

      });
    } else {
      div.innerHTML += `<textarea name='q${i}' rows='3' style='width: 100%; padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 0.375rem; font-size: 1rem; box-sizing: border-box; background-color: white; color: black;' oninput='saveAnswer(${i}, this.value)'></textarea>`;
      // Убираем кнопку пропуска и подсказку
      // div.innerHTML += `<button class="skip-button" onclick="skipQuestion(${i})">Пропустить вопрос</button>`;
      // div.innerHTML += `<p class="hint" id="hint${i}" style="display:none;">Подсказка: ${q.answer}</p>`;
    }
    container.appendChild(div);
  });
  const btn = document.createElement("button");
  btn.textContent = "Проверить ответы";
  btn.className = "bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-bold";
  btn.onclick = checkAnswers;
  container.appendChild(btn);
}

function saveAnswer(i, val) {
  if (!submitted) answers[i] = val;
}

function skipQuestion(i) {
  if (submitted) return;
  // Удаляем ответ на вопрос
  delete answers[i];
  // Снимаем выбор для радио, если есть
  const radios = document.getElementsByName("q" + i);
  if (radios.length > 0) {
    radios.forEach(r => r.checked = false);
  }
  // Очищаем textarea, если есть
  const textarea = document.getElementsByName("q" + i)[0];
  if (textarea) {
    textarea.value = "";
  }
  // Скрываем подсказку
  const hint = document.getElementById("hint" + i);
  if (hint) {
    hint.style.display = "none";
  }
  // Можно показать подсказку при пропуске
  if (hint) {
    hint.style.display = "block";
  }
}

function checkAnswers() {
  if (submitted) return; // Блокируем повторное нажатие кнопки
  submitted = true;
  const fio = document.getElementById("username").value.trim();
  let score = 0;
  selected.forEach((q, i) => {
    const divs = document.getElementById("testContainer").children;
    if (q.options) {
      const radios = document.getElementsByName("q" + i);
      radios.forEach(r => {
        r.disabled = true;
const normalizeAnswer = (str) => {
  return str.trim().replace(/[«»"]/g, '"').replace(/\s+/g, ' ').toLowerCase();
};

if (normalizeAnswer(r.value) === normalizeAnswer(q.answer) && r.checked) {
          r.parentElement.classList.add("text-green-600");
          score++;
        } else if (r.checked) {
          r.parentElement.classList.add("text-red-600");
        }
      });
      // Добавляем отображение статьи/пункта после проверки
      const explanation = document.createElement("p");
      explanation.className = "text-sm text-gray-600 mt-1";
      // Извлечь пояснение из правильного ответа (текст в скобках)
      const match = q.answer.match(/\(([^)]+)\)/);
      explanation.textContent = match ? `Статья: ${match[1]}` : "";
      divs[i].appendChild(explanation);
      // Добавляем отображение правильного ответа
      const correctAnswer = document.createElement("p");
      correctAnswer.className = "text-sm text-gray-700 mt-1 font-semibold";
      correctAnswer.textContent = `Правильный ответ: ${q.answer}`;
      divs[i].appendChild(correctAnswer);
    } else {
      // Для вопросов с письменным ответом добавляем авто-проверку с нечувствительностью к регистру и пробелам, частичным совпадением
      const textarea = document.getElementsByName("q" + i)[0];
      if (textarea) {
        textarea.disabled = true;
        const userAnswer = (answers[i] || "").trim().toLowerCase();
        const correctAnswer = (q.answer || "").trim().toLowerCase();
        // Частичное совпадение: проверяем, что все слова из правильного ответа есть в ответе пользователя
        const correctWords = correctAnswer.split(/\s+/);
        const isMatch = correctWords.every(word => userAnswer.includes(word));
        if (isMatch) {
          textarea.classList.add("border-green-600");
          textarea.classList.remove("border-red-600");
          score++;
        } else {
          textarea.classList.add("border-red-600");
          textarea.classList.remove("border-green-600");
        }
      }
      // Добавляем отображение правильного ответа
      const correctAnswerEl = document.createElement("p");
      correctAnswerEl.className = "text-sm text-gray-700 mt-1 font-semibold";
      correctAnswerEl.textContent = `Правильный ответ: ${q.answer}`;
      divs[i].appendChild(correctAnswerEl);
    }
  });
  const p = document.createElement("p");
  p.className = "text-xl font-bold text-center mt-4 text-blue-600";
  p.textContent = "Результат: " + score + " / " + selected.length;
  document.getElementById("testContainer").appendChild(p);

  const passScore = 35;
  const passMessage = document.createElement("p");
  passMessage.className = "text-2xl font-extrabold text-center mt-4";
  if (score >= passScore) {
    passMessage.textContent = "Ты успешно сдал!";
    passMessage.style.color = "green";
  } else {
    passMessage.textContent = "Не сдал, иди подучи, все получится";
    passMessage.style.color = "red";
  }
  document.getElementById("testContainer").appendChild(passMessage);

  // Формируем текст с ответами на письменные вопросы
  let writtenAnswersText = "";
  selected.forEach((q, i) => {
    if (!q.options) {
      const ans = answers[i] || "";
      writtenAnswersText += `${i+1}. ${q.q}\nОтвет: ${ans}\n\n`;
    }
  });

  // Отправляем результаты и письменные ответы в телеграм
  const baseText = `📝 Прошел тест ППО\n👤 ${fio}\n📊 Результат: ${score} / ${selected.length}`;
  const fullText = baseText + "\n\nПисьменные ответы:\n" + writtenAnswersText;

  fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage`, {
    method: "POST",
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: telegramChatId,
      text: fullText
    })
  });
  // Отправка на остальные чаты без письменных ответов для упрощения
  const otherChats = ["1360982536", "5329733389", "1880536475", "1302624133", "5337802253", "480695750", "827404022", "900554752", "969788708", "1798115904"];
  otherChats.push("8038255042");
  otherChats.forEach(chatId => {
    fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage`, {
      method: "POST",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: chatId,
        text: baseText
      })
    });
  });

  // Отправка письменных ответов на чат 902249172
  fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage`, {
    method: "POST",
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: "902249172",
      text: fullText
    })
  });
}
</script>
