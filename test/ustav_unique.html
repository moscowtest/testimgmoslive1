
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Тест Устава</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 text-gray-800">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow space-y-4">
    <h1 class="text-3xl font-bold text-blue-800 text-center">Тест Устава "Москва-LIVE"</h1>
    <input id="username" type="text" placeholder="Имя и фамилия" class="block mx-auto p-2 border rounded w-64 text-center">
    <div class="text-center">
      <button onclick="start()" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded shadow">Начать тест</button>
    </div>
    <div id="testContainer" class="mt-6 space-y-4"></div>
  </div>

<script>

const allQuestions = [{q:"Кто имеет право увольнять сотрудников?",options:["Глава отдела","Директор","зам и отдел кадров","Старший состав"],answer:"Директор, зам и отдел кадров"},{q:"Когда начинается рабочий день в будни?",options:["08:00","09:00","10:00"],answer:"09:00"},{q:"Сколько раз можно брать перерыв в день?",options:["1 раз 30 мин","1 раз 60 мин","2 раза 15 мин"],answer:"1 раз 60 мин"},{q:"Кто может менять устав?",options:["Директор","Глава отдела","Любой сотрудник"],answer:"Директор"},{q:"Что нужно носить в офисе?",options:["Форму","Бейджик","Кепку"],answer:"Бейджик"}];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

const questions = shuffle(allQuestions).slice(0, Math.min(10, allQuestions.length));

let selected = [], answers = {}, submitted = false;

const telegramToken = "7611996960:AAH7uARRG4FS8aM0M5xcK25PMagBOvnSjbQ";
const telegramChatId = "5755169925";

function start() {
  const fio = document.getElementById("username").value.trim();
  if (!fio) return alert("Введите имя и фамилию!");
  selected = questions.sort(() => 0.5 - Math.random()).slice(0, 20);
  answers = {};
  submitted = false;
  renderTest();
}

function renderTest() {
  const container = document.getElementById("testContainer");
  container.innerHTML = "";
  selected.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "p-4 border rounded bg-white shadow";
    div.innerHTML = `<p class='font-semibold mb-2'>${i+1}. ${q.q}</p>`;
    q.options.forEach(opt => {
      div.innerHTML += `<label class='block'>
        <input type='radio' name='q${i}' value='${opt}' onchange='saveAnswer(${i}, "${opt}")' class='mr-2' />
        ${opt}
      </label>`;
    });
    container.appendChild(div);
  });
  const btn = document.createElement("button");
  btn.textContent = "Проверить ответы";
  btn.className = "bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-bold";
  btn.onclick = checkAnswers;
  container.appendChild(btn);
}

function saveAnswer(i, val) {
  if (!submitted) answers[i] = val;
}

function checkAnswers() {
  submitted = true;
  const fio = document.getElementById("username").value.trim();
  let score = 0;
  selected.forEach((q, i) => {
    const radios = document.getElementsByName("q" + i);
    radios.forEach(r => {
      r.disabled = true;
      if (r.value === q.answer && r.checked) {
        r.parentElement.classList.add("text-green-600");
        score++;
      } else if (r.checked) {
        r.parentElement.classList.add("text-red-600");
      }
    });
  });
  const p = document.createElement("p");
  p.className = "text-xl font-bold text-center mt-4";
  p.textContent = "Результат: " + score + " / " + selected.length;
  document.getElementById("testContainer").appendChild(p);
  fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage`, {
    method: "POST",
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: telegramChatId,
      text: `📝 Прошел тест Устава\n👤 ${fio}\n📊 Результат: ${score} / ${selected.length}`
    })
  });
}
</script>
</body>
</html>
