  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      html.classList.toggle('dark');
      html.classList.toggle('light');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      const themeIcon = document.getElementById('theme-icon');
      if (themeIcon) themeIcon.textContent = isDark ? '☀️' : '🌙';
    }

    (function() {
      const savedTheme = localStorage.getItem('theme');
      const html = document.documentElement;
      if (savedTheme === 'dark') {
        html.classList.add('dark');
        html.classList.remove('light');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = '☀️';
      } else {
        html.classList.add('light');
        html.classList.remove('dark');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = '🌙';
      }
    })();
  </script>

<script>
let timerInterval;
let timeLeft = 900; // 15 минут в секундах

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 900;
  updateTimerDisplay();
  updateProgressBar();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    updateProgressBar();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Время вышло!");
      disableTest();
    }
  }, 1000);
}

function updateTimerDisplay() {
  let timerEl = document.getElementById("timer");
  if (!timerEl) {
    timerEl = document.createElement("p");
    timerEl.id = "timer";
    timerEl.className = "mt-2 font-semibold text-gray-700";
    const container = document.querySelector(".text-center");
    if (container) container.appendChild(timerEl);
  }
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  timerEl.innerHTML = `<span class="mr-1">⏰</span> Осталось времени: <span class="font-mono">${minutes}:${seconds.toString().padStart(2, '0')}</span>`;
}

function updateProgressBar() {
  const progressBar = document.getElementById("progressBar");
  const totalTime = 900;
  const percent = ((totalTime - timeLeft) / totalTime) * 100;
  progressBar.style.width = percent + "%";
}

function disableTest() {
  const inputs = document.querySelectorAll("#testContainer input[type='radio']");
  inputs.forEach(input => input.disabled = true);
  const btn = document.querySelector("button[onclick='checkAnswers()']");
  if (btn) btn.disabled = true;
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

    firstQuestion = allQuestions.splice(firstQuestionIndex, 1)[0];
  }
  // Перемешать остальные вопросы
  const shuffled = allQuestions.sort(() => 0.5 - Math.random());
  // Выбрать 19 случайных вопросов
  const selectedQuestions = shuffled.slice(0, 19);
  // Добавить первый вопрос в начало
  selected = [firstQuestion, ...selectedQuestions];
  answers = {};
  submitted = false;
  renderTest();
  startTimer();
}

function renderTest() {
  const container = document.getElementById("testContainer");
  container.innerHTML = "";
  selected.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "p-4 border rounded bg-white shadow";
    
    if (q.options) {
      // Multiple choice question
      div.innerHTML = `<p class='font-semibold mb-2'>${i+1}. ${q.q}</p>`;
      q.options.forEach(opt => {
        div.innerHTML += `<label class='block'>
          <input type='radio' name='q${i}' value='${opt}' onchange='saveAnswer(${i}, "${opt}")' class='mr-2' />
          ${opt}
        </label>`;
      });
    } else {
      // Text input question
      div.innerHTML = `<p class='font-semibold mb-2'>${i+1}. ${q.q}</p>
        <div class="mt-2">
          <label class="block mb-2">Раздевалка: <input type="text" name="q${i}_razdelka" class="border rounded px-2 py-1 w-16" placeholder="минут"> минут.</label>
          <label class="block mb-2">Холл Green-Студии: <input type="text" name="q${i}_green" class="border rounded px-2 py-1 w-16" placeholder="минут"> минут.</label>
          <label class="block mb-2">Live-Студия: <input type="text" name="q${i}_live" class="border rounded px-2 py-1 w-16" placeholder="минут"> минут.</label>
        </div>`;
    }
    container.appendChild(div);
  });
  const btn = document.createElement("button");
  btn.textContent = "Проверить ответы";
  btn.className = "bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-bold";
  btn.onclick = checkAnswers;
  container.appendChild(btn);
}

function saveAnswer(i, val) {
  if (!submitted) answers[i] = val;
}
