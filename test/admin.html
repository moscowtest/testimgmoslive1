  <link href="styles.css" rel="stylesheet" />
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      html.classList.toggle('dark');
      html.classList.toggle('light');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
    }

    // On page load, apply saved theme
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const html = document.documentElement;
      if (savedTheme === 'dark') {
        html.classList.add('dark');
        html.classList.remove('light');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = '☀️';
      } else {
        html.classList.add('light');
        html.classList.remove('dark');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = '🌙';
      }
    })();
  </script>
</head>

const defaults = {
  "ppoQuestions": defaultPpoQuestions,
  "ppoWrittenQuestions": defaultPpoWrittenQuestions,
  "ustavQuestions": defaultUstavQuestions
};

const PASSWORD = "admin2024";
let currentSet = "ppoQuestions";
let questions = JSON.parse(localStorage.getItem(currentSet) || "[]");
let editingIndex = -1;

document.getElementById("pw").addEventListener("change", function() {
  if (this.value === PASSWORD) {
    document.getElementById("panel").classList.remove("hidden");
    // Initialize all sets in localStorage if missing or empty
    Object.keys(defaults).forEach(key => {
      const stored = localStorage.getItem(key);
      if (!stored || JSON.parse(stored).length === 0) {
        localStorage.setItem(key, JSON.stringify(defaults[key]));
      }
    });
    questions = JSON.parse(localStorage.getItem(currentSet));
    renderList();
  }
});

function switchSet(set) {
  currentSet = set;
  // Always initialize all sets if not present
  Object.keys(defaults).forEach(key => {
    if (!localStorage.getItem(key)) {
      localStorage.setItem(key, JSON.stringify(defaults[key]));
    }
  });
  questions = JSON.parse(localStorage.getItem(currentSet));
  renderList();
  updateActiveTab();
}

function updateActiveTab() {
  ['ppoQuestions', 'ppoWrittenQuestions', 'ustavQuestions'].forEach(id => {
    const btn = document.getElementById(`btn-${id}`);
    if (id === currentSet) {
      btn.classList.add('ring', 'ring-offset-2', 'ring-orange-400');
    } else {
      btn.classList.remove('ring', 'ring-offset-2', 'ring-orange-400');
    }
  });
}

function toggleType() {
  const type = document.getElementById("type").value;
  const optionFields = document.getElementById("optionFields");
  if (type === "written") {
    optionFields.style.display = "none";
  } else {
    optionFields.style.display = "block";
  }
}

function addQuestion() {
  const type = document.getElementById("type").value;
  const q = document.getElementById("q").value;
  const correct = document.getElementById("correct").value;
  if (!q || !correct) return alert("Заполните вопрос и правильный ответ");
  let questionObj;
  if (type === "multiple") {
    const a1 = document.getElementById("a1").value;
    const a2 = document.getElementById("a2").value;
    const a3 = document.getElementById("a3").value;
    if (!a1 || !a2 || !a3) return alert("Заполните все варианты ответов");
    questionObj = { q, options: [a1, a2, a3], answer: correct };
  } else {
    questionObj = { q, answer: correct };
  }
  if (editingIndex >= 0) {
    questions[editingIndex] = questionObj;
    editingIndex = -1;
    document.getElementById("addBtn").textContent = "➕ Добавить";
  } else {
    questions.push(questionObj);
  }
  localStorage.setItem(currentSet, JSON.stringify(questions));
  renderList();
  clearForm();
}

function clearForm() {
  document.getElementById("q").value = "";
  document.getElementById("a1").value = "";
  document.getElementById("a2").value = "";
  document.getElementById("a3").value = "";
  document.getElementById("correct").value = "";
  document.getElementById("type").value = "multiple";
  toggleType();
}

function editQuestion(i) {
  const q = questions[i];
  document.getElementById("q").value = q.q;
  document.getElementById("correct").value = q.answer;
  if (q.options) {
    document.getElementById("type").value = "multiple";
    toggleType();
    document.getElementById("a1").value = q.options[0];
    document.getElementById("a2").value = q.options[1];
    document.getElementById("a3").value = q.options[2];
  } else {
    document.getElementById("type").value = "written";
    toggleType();
  }
  editingIndex = i;
  document.getElementById("addBtn").textContent = "Обновить";
}

function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  if (!questions || questions.length === 0) {
    list.innerHTML = "<li>Вопросы отсутствуют</li>";
    return;
  }
  questions.forEach((item, i) => {
    const el = document.createElement("li");
    el.className = "bg-gray-100 dark:bg-gray-700 p-2 rounded";
    el.innerHTML = `<b>${i + 1}. ${item.q}</b><br>Ответ: ${item.answer} <button onclick="editQuestion(${i})" class="text-blue-500 underline mr-2">Редактировать</button><button onclick="del(${i})" class="text-red-500 underline">Удалить</button>`;
    list.appendChild(el);
  });
}

function del(i) {
  questions.splice(i, 1);
  localStorage.setItem(currentSet, JSON.stringify(questions));
  renderList();
}
