<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Тест по Руководству</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link href="styles.css" rel="stylesheet" />
  <style>
    .drag-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.75rem; margin-top: 1rem; }
    .draggable-item, .drop-target { padding: 0.5rem 1rem; border-radius: 0.375rem; box-shadow: 0 2px 6px rgba(0,0,0,0.2); user-select: none; cursor: grab; font-weight: 600; min-width: 150px; text-align: center; transition: all 0.2s ease; }
    .draggable-item { background-color: #4299e1; color: white; }
    .drop-target { background-color: #e2e8f0; color: #1a202c; min-height: 2.5rem; line-height: 2.5rem; border: 2px dashed transparent; }
    .drop-target.over { border-color: #4299e1; }
    .drop-target.correct { background-color: #48bb78; color: white; border: none; }
    .drop-target.incorrect { background-color: #f56565; color: white; border: none; }
    .progress-bar-container { width: 100%; background-color: #e2e8f0; border-radius: 0.375rem; height: 0.75rem; margin: 1rem 0; overflow: hidden; }
    .progress-bar { height: 100%; background-color: #4299e1; width: 0%; transition: width 0.3s ease; }
    @media (max-width: 768px) { .drag-container { flex-direction: column; align-items: center; } .draggable-item, .drop-target { min-width: 200px; width: 100%; } }
  </style>
</head>
<body class="transition-all p-6">
  <a href="index.html" class="fixed top-4 left-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-1 px-3 rounded shadow z-50">← Главная</a>
  <div class="fixed top-4 right-4 z-50"><button onclick="toggleTheme()" class="text-2xl" id="theme-icon">🌙</button></div>
  <div class="test-wrapper" style="max-width: 600px; margin: 50px auto 0 auto; padding: 1.5rem;">
    <h1 class="text-3xl font-bold text-blue-400 text-center mb-4">👔 Тест по Руководству</h1>
    <div id="startContainer" class="text-center">
      <input id="username" type="text" placeholder="Имя и фамилия" class="block mx-auto p-2 border rounded w-64 text-center" />
      <button onclick="startTest()" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded shadow mt-2">▶ Начать тест</button>
    </div>
    <div id="testContainer" style="display:none;">
      <div class="progress-bar-container"><div id="progressBar" class="progress-bar"></div></div>
      <div id="userNameDisplay" class="text-center font-bold mt-2"></div>
      <div><h2 class="text-xl font-semibold mb-2">📌 Должности</h2><div class="drag-container" id="rolesContainer">
        <div class="draggable-item" data-role="Председатель-Правительства">Председатель-Правительства</div>
        <div class="draggable-item" data-role="Заместитель-Председателя-Правительства 1">Заместитель-Председателя-Правительства 1</div>
        <div class="draggable-item" data-role="Министр социальной политики">Министр социальной политики</div>
        <div class="draggable-item" data-role="Директор Москва-LIVE">Директор Москва-LIVE</div>
      </div></div>
      <div><h2 class="text-xl font-semibold mt-6 mb-2">👤 Руководство</h2><div class="drag-container" id="namesContainer">
        <div class="drop-target" data-expected="Председатель-Правительства">Виктор Ваффентрагер</div>
        <div class="drop-target" data-expected="Заместитель-Председателя-Правительства 1">Даниил Гранде</div>
        <div class="drop-target" data-expected="Министр социальной политики">Рамзан Непупсиков</div>
        <div class="drop-target" data-expected="Директор Москва-LIVE">Данил Валерьянов</div>
      </div></div>
      <div id="resultContainer" class="mt-4"></div>
      <button id="checkBtn" class="bg-green-600 hover:bg-green-700 text-white py-3 px-6 rounded-xl font-semibold shadow mt-4 w-full" style="display:none;">✅ Проверить ответы</button>
    </div>
  </div>

<script>
let timerInterval, timeLeft = 900;
function toggleTheme() {
  const html = document.documentElement;
  html.classList.toggle('dark'); html.classList.toggle('light');
  localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
}
(function() {
  const saved = localStorage.getItem('theme');
  const html = document.documentElement;
  if (saved === 'dark') { html.classList.add('dark'); html.classList.remove('light'); }
  else { html.classList.add('light'); html.classList.remove('dark'); }
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = saved === 'dark' ? '☀️' : '🌙';
})();

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 900;
  updateProgressBar();
  timerInterval = setInterval(() => { timeLeft--; updateProgressBar(); if (timeLeft <= 0) { clearInterval(timerInterval); alert("Время вышло!"); disableTest(); } }, 1000);
}
function updateProgressBar() { const bar = document.getElementById("progressBar"); if (bar) bar.style.width = ((900 - timeLeft) / 900) * 100 + "%"; }
function disableTest() { document.querySelectorAll('.draggable-item').forEach(i => i.setAttribute('draggable', false)); document.getElementById('checkBtn').disabled = true; }

async function sendToTelegram(message) {
  const token = "7611996960:AAH7uARRG4FS8aM0M5xcK25PMagBOvnSjbQ";
  const url = `https://api.telegram.org/bot${token}/sendMessage`;
  try { await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: "5755169925", text: message, parse_mode: "HTML" }) }); } catch(e) { console.error(e); }
}

function startTest() {
  const fio = document.getElementById("username").value.trim();
  if (!fio) { alert("Введите имя и фамилию!"); return; }
  document.getElementById("startContainer").style.display = "none";
  document.getElementById("testContainer").style.display = "block";
  document.getElementById("checkBtn").style.display = "inline-block";
  document.getElementById("userNameDisplay").innerHTML = `<span class="font-bold">${fio}</span>`;
  startTimer();
  initDragAndDrop(fio);
}

function initDragAndDrop(fio) {
  function shuffle(container) { for (let i = container.children.length; i >= 0; i--) container.appendChild(container.children[Math.random() * i | 0]); }
  shuffle(document.getElementById('rolesContainer'));
  shuffle(document.getElementById('namesContainer'));
  let draggedItem = null;
  document.querySelectorAll('.draggable-item').forEach(item => {
    item.setAttribute('draggable', 'true');
    item.ondragstart = (e) => { draggedItem = item; e.dataTransfer.setData('text/plain', ''); };
    item.ondragend = () => { draggedItem = null; };
  });
  document.querySelectorAll('.drop-target').forEach(target => {
    target.ondragover = (e) => e.preventDefault();
    target.ondragenter = (e) => { e.preventDefault(); target.classList.add('over'); };
    target.ondragleave = () => target.classList.remove('over');
    target.ondrop = (e) => { e.preventDefault(); target.classList.remove('over'); if (draggedItem) target.appendChild(draggedItem); };
  });
  document.getElementById('checkBtn').onclick = () => {
    let correct = 0;
    document.querySelectorAll('.drop-target').forEach(t => {
      const expected = t.getAttribute('data-expected');
      const child = t.firstElementChild;
      if (child && child.getAttribute('data-role') === expected) { t.classList.add('correct'); correct++; }
      else t.classList.add('incorrect');
    });
    disableTest();
    clearInterval(timerInterval);
    const total = document.querySelectorAll('.drop-target').length;
    const pass = Math.floor(total * 0.7);
    const resultDiv = document.getElementById('resultContainer');
    resultDiv.innerHTML = `<div class="p-4 rounded text-center font-bold text-xl ${correct >= pass ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">📊 Результат: ${correct} / ${total}<br>${correct >= pass ? '✅ СДАЛ!' : '❌ НЕ СДАЛ'}</div>`;
    sendToTelegram(`📝 <b>Тест Руководства</b>\n👤 ${fio}\n📊 ${correct}/${total}\n${correct >= pass ? "✅ СДАЛ" : "❌ НЕ СДАЛ"}`);
  };
}
</script>
</body>
</html>
