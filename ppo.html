<!DOCTYPE html>
<html lang="ru" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тест по ППО</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet" />
  <style>
    .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 8px; z-index: 1000; animation: slideIn 0.3s ease; z-index: 1001; }
    .toast.error { background: #ef4444; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-bar-container { width: 100%; background-color: #e2e8f0; border-radius: 0.375rem; height: 0.75rem; margin: 1rem 0; overflow: hidden; }
    .progress-bar { height: 100%; background-color: #4299e1; width: 0%; transition: width 0.3s ease; }
  </style>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      html.classList.toggle('dark');
      html.classList.toggle('light');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      const icon = document.getElementById('theme-icon');
      if (icon) icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
    }
    (function() {
      const saved = localStorage.getItem('theme');
      const html = document.documentElement;
      if (saved === 'dark') { html.classList.add('dark'); html.classList.remove('light'); }
      else { html.classList.add('light'); html.classList.remove('dark'); }
      const icon = document.getElementById('theme-icon');
      if (icon) icon.textContent = saved === 'dark' ? '☀️' : '🌙';
    })();
    function showToast(msg, isError = false) {
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</head>
<body class="transition-all">
  <a href="index.html" class="fixed top-4 left-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-1 px-3 rounded shadow z-50">← Главная</a>
  <div class="fixed top-4 right-4 z-50"><button onclick="toggleTheme()" class="text-2xl" id="theme-icon">🌙</button></div>
  <div class="test-wrapper" style="max-width: 600px; margin: 50px auto 0 auto; padding: 1.5rem;">
    <h1 class="text-3xl font-bold text-blue-400 text-center mb-4">📋 Тест по ППО</h1>
    <div class="text-center mb-4"><a href="https://www.table-ppo.ru/" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded shadow inline-block text-sm">Официальная таблица ППО</a></div>
    <input id="username" type="text" placeholder="Имя и фамилия" class="block mx-auto p-2 border rounded w-64 text-center dark:bg-gray-700" />
    <div class="text-center mt-4"><button onclick="start()" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded shadow">▶ Начать тест</button></div>
    <div id="testContainer" class="mt-6 space-y-4"></div>
  </div>

<script>
const TELEGRAM_TOKEN = "7611996960:AAH7uARRG4FS8aM0M5xcK25PMagBOvnSjbQ";
const TELEGRAM_CHAT_ID = "5755169925";
const OTHER_CHATS = ["1360982536", "5329733389", "1880536475", "1302624133", "5337802253", "902249172", "8038255042"];

let timerInterval, timeLeft = 1800, selected = [], answers = {}, submitted = false;

function loadQuestions() {
  const mc = JSON.parse(localStorage.getItem("ppoQuestions") || "[]");
  const written = JSON.parse(localStorage.getItem("ppoWrittenQuestions") || "[]");
  if (!mc.length && !written.length) showToast("⚠️ Нет вопросов! Зайдите в админ-панель и добавьте.", true);
  return { mc, written };
}

function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 1800;
  updateTimerDisplay();
  timerInterval = setInterval(() => { timeLeft--; updateTimerDisplay(); if (timeLeft <= 0) { clearInterval(timerInterval); alert("Время вышло!"); disableTest(); } }, 1000);
}
function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  const timerEl = document.getElementById("timer");
  if (timerEl) timerEl.innerHTML = `⏰ ${m}:${s.toString().padStart(2, '0')}`;
  const bar = document.getElementById("progressBar");
  if (bar) bar.style.width = ((1800 - timeLeft) / 1800) * 100 + "%";
}
function disableTest() { document.querySelectorAll("#testContainer input, #testContainer textarea, #checkBtn").forEach(el => el.disabled = true); }

async function sendToTelegram(message) {
  const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
  try {
    await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: "HTML" }) });
    for (const id of OTHER_CHATS) fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: id, text: message, parse_mode: "HTML" }) });
  } catch(e) { console.error(e); }
}

function start() {
  const fio = document.getElementById("username").value.trim();
  if (!fio) return showToast("Введите имя и фамилию!", true);
  const { mc, written } = loadQuestions();
  const combined = [...shuffle([...mc]).slice(0, 20), ...shuffle([...written]).slice(0, 10)];
  selected = shuffle(combined);
  answers = {}; submitted = false;
  renderTest();
  startTimer();
}

function renderTest() {
  const container = document.getElementById("testContainer");
  container.innerHTML = `<div id="timer" class="timer text-center font-bold text-lg"></div><div class="progress-bar-container"><div id="progressBar" class="progress-bar"></div></div>`;
  selected.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "p-4 border rounded bg-white dark:bg-gray-800 shadow";
    div.innerHTML = `<p class='font-semibold mb-2'>${i+1}. ${q.q}</p>`;
    if (q.options) {
      q.options.forEach(opt => { div.innerHTML += `<label class='block'><input type='radio' name='q${i}' value='${opt.replace(/"/g, '&quot;')}' onchange='saveAnswer(${i}, this.value)' class='mr-2' />${opt}</label>`; });
    } else {
      div.innerHTML += `<textarea name='q${i}' rows='2' class='w-full p-2 border rounded dark:bg-gray-700' oninput='saveAnswer(${i}, this.value)'></textarea>`;
    }
    container.appendChild(div);
  });
  const btn = document.createElement("button");
  btn.id = "checkBtn";
  btn.textContent = "✅ Проверить ответы";
  btn.className = "bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-bold mt-4 w-full";
  btn.onclick = checkAnswers;
  container.appendChild(btn);
}

function saveAnswer(i, val) { if (!submitted) answers[i] = val; }

function checkAnswers() {
  if (submitted) return;
  submitted = true;
  const fio = document.getElementById("username").value.trim();
  let score = 0;
  selected.forEach((q, i) => {
    const div = document.getElementById("testContainer").children[i+1];
    if (q.options) {
      const radios = document.getElementsByName("q" + i);
      let correct = false;
      radios.forEach(r => { r.disabled = true; if (r.checked && r.value === q.answer) { correct = true; r.parentElement.classList.add("text-green-600"); } else if (r.checked) r.parentElement.classList.add("text-red-600"); });
      if (correct) score++;
      div.innerHTML += `<p class='text-sm text-gray-500 mt-1'>✅ Правильно: ${q.answer}</p>`;
    } else {
      const ta = document.getElementsByName("q" + i)[0];
      if (ta) { ta.disabled = true; if ((answers[i] || "").trim().toLowerCase() === q.answer.toLowerCase()) { score++; ta.classList.add("border-green-600"); } else ta.classList.add("border-red-600"); }
      div.innerHTML += `<p class='text-sm text-gray-500 mt-1'>✅ Правильно: ${q.answer}</p>`;
    }
  });
  const container = document.getElementById("testContainer");
  const passScore = Math.floor(selected.length * 0.7);
  container.innerHTML += `<div class="mt-4 p-4 rounded text-center font-bold text-xl ${score >= passScore ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">📊 Результат: ${score} / ${selected.length}<br>${score >= passScore ? '✅ СДАЛ!' : '❌ НЕ СДАЛ'}</div>`;
  clearInterval(timerInterval);
  sendToTelegram(`📝 <b>Тест ППО</b>\n👤 ${fio}\n📊 ${score}/${selected.length}\n${score >= passScore ? "✅ СДАЛ" : "❌ НЕ СДАЛ"}`);
}
</script>
</body>
</html>
