<!DOCTYPE html>
<html lang="ru" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тест по ППО</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link href="styles.css" rel="stylesheet" />
  <style>
    .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 8px; z-index: 1000; animation: slideIn 0.3s ease; }
    .toast.error { background: #ef4444; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .progress-bar-container { width: 100%; background-color: #e2e8f0; border-radius: 0.375rem; height: 0.75rem; margin: 1rem 0; overflow: hidden; }
    .progress-bar { height: 100%; background-color: #4299e1; width: 0%; transition: width 0.3s ease; }
    .timer { font-weight: 600; color: #60a5fa; font-size: 1.1rem; margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
  </style>
</head>
<body class="transition-all">
  <a href="index.html" class="fixed top-4 left-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-1 px-3 rounded shadow z-50">← Главная</a>
  <div class="fixed top-4 right-4 z-50"><button onclick="toggleTheme()" class="text-2xl" id="theme-icon">🌙</button></div>
  <div class="test-wrapper" style="max-width: 600px; margin: 50px auto 0 auto; padding: 1.5rem;">
    <h1 class="text-3xl font-bold text-blue-400 text-center mb-4">📋 Тест по ППО</h1>
    <div class="text-center mb-4"><a href="https://www.table-ppo.ru/" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded shadow inline-block text-sm">Официальная таблица ППО</a></div>
    <input id="username" type="text" placeholder="Имя и фамилия" class="block mx-auto p-2 border rounded w-64 text-center dark:bg-gray-700" />
    <div class="text-center mt-4"><button onclick="start()" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded shadow">▶ Начать тест</button></div>
    <div id="testContainer" class="mt-6 space-y-4"></div>
  </div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCuOIt7wMUrN8vu9RQqivNj9w3CdFitrqE",
  authDomain: "moscow-live-tests.firebaseapp.com",
  projectId: "moscow-live-tests",
  storageBucket: "moscow-live-tests.firebasestorage.app",
  messagingSenderId: "956332293918",
  appId: "1:956332293918:web:e7f66986cca2a30474130f"
};

const TELEGRAM_TOKEN = "7611996960:AAH7uARRG4FS8aM0M5xcK25PMagBOvnSjbQ";
const TELEGRAM_CHAT_ID = "5755169925";
const OTHER_CHATS = ["1360982536", "5329733389", "1880536475", "1302624133", "5337802253", "902249172", "8038255042"];

let timerInterval, timeLeft = 1800, selected = [], answers = {}, submitted = false;
let allQuestions = [];
let db = null;

function showToast(msg, isError) { const t = document.createElement('div'); t.className = `toast ${isError ? 'error' : ''}`; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
function initFirebase() { if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); }
async function loadQuestionsFromFirebase() {
  if (!db) initFirebase();
  try {
    const mc = await db.ref('questions/ppoQuestions').once('value');
    const wr = await db.ref('questions/ppoWrittenQuestions').once('value');
    let mcQ = mc.exists() ? mc.val() : [];
    let wrQ = wr.exists() ? wr.val() : [];
    mcQ = mcQ.filter(q => q.inTest !== false);
    wrQ = wrQ.filter(q => q.inTest !== false);
    allQuestions = [...mcQ, ...wrQ];
    return allQuestions.length > 0;
  } catch(e) { return false; }
}
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 1800;
  updateTimerDisplay();
  timerInterval = setInterval(() => { timeLeft--; updateTimerDisplay(); if (timeLeft <= 0) { clearInterval(timerInterval); alert("Время вышло!"); disableTest(); } }, 1000);
}
function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  const timerEl = document.getElementById("timer");
  if (timerEl) timerEl.innerHTML = `⏰ ${m}:${s.toString().padStart(2, '0')}`;
  const bar = document.getElementById("progressBar");
  if (bar) bar.style.width = ((1800 - timeLeft) / 1800) * 100 + "%";
}
function disableTest() { document.querySelectorAll("#testContainer input, #testContainer textarea, #checkBtn").forEach(el => el.disabled = true); }
async function sendToTelegram(message) {
  const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
  try {
    await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: "HTML" }) });
    for (const id of OTHER_CHATS) fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: id, text: message, parse_mode: "HTML" }) });
  } catch(e) {}
}
async function start() {
  const fio = document.getElementById("username").value.trim();
  if (!fio) return showToast("Введите имя и фамилию!", true);
  const ok = await loadQuestionsFromFirebase();
  if (!ok || allQuestions.length === 0) return showToast("❌ Нет вопросов для теста!", true);
  selected = shuffle([...allQuestions]);
  answers = {}; submitted = false;
  const container = document.getElementById("testContainer");
  container.innerHTML = `<div id="timer" class="timer"></div><div class="progress-bar-container"><div id="progressBar" class="progress-bar"></div></div>`;
  selected.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "p-4 border rounded bg-white dark:bg-gray-800 shadow";
    div.innerHTML = `<p class='font-semibold mb-2'>${i+1}. ${q.q}</p>`;
    if (q.options) {
      q.options.forEach(opt => { div.innerHTML += `<label class='block'><input type='radio' name='q${i}' value='${opt}' class='mr-2' />${opt}</label>`; });
    } else {
      div.innerHTML += `<textarea name='q${i}' rows='2' class='w-full p-2 border rounded dark:bg-gray-700' placeholder="Введите ответ..."></textarea>`;
    }
    container.appendChild(div);
  });
  const btn = document.createElement("button");
  btn.id = "checkBtn";
  btn.textContent = "✅ Проверить ответы";
  btn.className = "bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-bold mt-4 w-full";
  btn.onclick = () => checkAnswers(fio);
  container.appendChild(btn);
  startTimer();
}
function checkAnswers(fio) {
  if (submitted) return;
  submitted = true;
  for (let i = 0; i < selected.length; i++) {
    const radios = document.getElementsByName(`q${i}`);
    const textarea = document.querySelector(`textarea[name='q${i}']`);
    if (radios.length) { for (let r of radios) if (r.checked) answers[i] = r.value; }
    else if (textarea) answers[i] = textarea.value;
  }
  let score = 0;
  for (let i = 0; i < selected.length; i++) {
    const q = selected[i];
    const user = answers[i] || "";
    let isCorrect = false;
    if (q.options) isCorrect = (user === q.answer);
    else isCorrect = user.trim().toLowerCase() === q.answer.trim().toLowerCase();
    if (isCorrect) score++;
    const div = document.querySelector(`#testContainer .p-4:nth-child(${i+2})`);
    if (div) {
      const ansDiv = document.createElement("div");
      ansDiv.className = `text-sm mt-2 pt-2 border-t ${isCorrect ? 'text-green-600' : 'text-red-600'}`;
      ansDiv.innerHTML = `${isCorrect ? '✅' : '❌'} Правильный ответ: ${q.answer}`;
      div.appendChild(ansDiv);
    }
  }
  for (let i = 0; i < selected.length; i++) {
    const radios = document.getElementsByName(`q${i}`);
    radios.forEach(r => r.disabled = true);
    const ta = document.querySelector(`textarea[name='q${i}']`);
    if (ta) ta.disabled = true;
  }
  const pass = Math.floor(selected.length * 0.7);
  const container = document.getElementById("testContainer");
  const res = document.createElement("div");
  res.className = `mt-4 p-4 rounded text-center font-bold text-xl ${score >= pass ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
  res.innerHTML = `📊 Результат: ${score} / ${selected.length}<br>${score >= pass ? '✅ СДАЛ!' : '❌ НЕ СДАЛ'}`;
  container.appendChild(res);
  clearInterval(timerInterval);
  sendToTelegram(`📝 <b>Тест ППО</b>\n👤 ${fio}\n📊 ${score}/${selected.length}\n${score >= pass ? "✅ СДАЛ" : "❌ НЕ СДАЛ"}`);
}
function toggleTheme() {
  const html = document.documentElement;
  html.classList.toggle('dark');
  html.classList.toggle('light');
  localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
}
(function() {
  const s = localStorage.getItem('theme');
  const h = document.documentElement;
  if (s === 'dark') { h.classList.add('dark'); h.classList.remove('light'); }
  else { h.classList.add('light'); h.classList.remove('dark'); }
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = s === 'dark' ? '☀️' : '🌙';
})();
initFirebase();
</script>
</body>
</html>
