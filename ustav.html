<!DOCTYPE html>
<html lang="ru" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тест по Уставу</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link href="styles.css" rel="stylesheet" />
  <style>
    .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 8px; z-index: 1000; animation: slideIn 0.3s ease; }
    .toast.error { background: #ef4444; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .progress-bar-container { width: 100%; background-color: #e2e8f0; border-radius: 0.375rem; height: 0.75rem; margin: 1rem 0; overflow: hidden; }
    .progress-bar { height: 100%; background-color: #4299e1; width: 0%; transition: width 0.3s ease; }
    .timer { font-weight: 600; color: #60a5fa; font-size: 1.1rem; margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
  </style>
</head>
<body class="transition-all">
  <a href="index.html" class="fixed top-4 left-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-1 px-3 rounded shadow z-50">← Главная</a>
  <div class="fixed top-4 right-4 z-50"><button onclick="toggleTheme()" class="text-2xl" id="theme-icon">🌙</button></div>
  <div class="test-wrapper" style="max-width: 600px; margin: 50px auto 0 auto; padding: 1.5rem;">
    <h1 class="text-3xl font-bold text-blue-400 text-center mb-4">📜 Тест по Уставу</h1>
    <input id="username" type="text" placeholder="Имя и фамилия" class="block mx-auto p-2 border rounded w-64 text-center dark:bg-gray-700" />
    <div class="text-center mt-4"><button id="startBtn" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded shadow">▶ Начать тест</button></div>
    <div id="testContainer" class="mt-6 space-y-4"></div>
  </div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCuOIt7wMUrN8vu9RQqivNj9w3CdFitrqE",
  authDomain: "moscow-live-tests.firebaseapp.com",
  projectId: "moscow-live-tests",
  storageBucket: "moscow-live-tests.firebasestorage.app",
  messagingSenderId: "956332293918",
  appId: "1:956332293918:web:e7f66986cca2a30474130f"
};

const TELEGRAM_TOKEN = "7611996960:AAH7uARRG4FS8aM0M5xcK25PMagBOvnSjbQ";
const TELEGRAM_CHAT_ID = "5755169925";
const OTHER_CHATS = ["1360982536", "5329733389", "1880536475", "1302624133", "5337802253", "902249172", "8038255042"];

let timerInterval, timeLeft = 900, selected = [], answers = {}, submitted = false;
let allQuestions = [];
let db = null;

function showToast(msg, isError) { 
  const t = document.createElement('div'); 
  t.className = `toast ${isError ? 'error' : ''}`; 
  t.textContent = msg; 
  document.body.appendChild(t); 
  setTimeout(() => t.remove(), 3000); 
}

function initFirebase() { 
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG); 
  db = firebase.database(); 
  console.log('Firebase ready');
}

async function loadQuestions() {
  if (!db) initFirebase();
  try {
    const snap = await db.ref('questions/ustavQuestions').once('value');
    let q = snap.exists() ? snap.val() : [];
    // Берём все вопросы, у которых inTest не false
    allQuestions = q.filter(qq => qq.inTest !== false);
    console.log('Загружено вопросов:', allQuestions.length);
    return allQuestions.length;
  } catch(e) {
    console.error(e);
    return 0;
  }
}

function shuffle(arr) { 
  for (let i = arr.length - 1; i > 0; i--) { 
    const j = Math.floor(Math.random() * (i + 1)); 
    [arr[i], arr[j]] = [arr[j], arr[i]]; 
  } 
  return arr; 
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 900;
  updateTimerDisplay();
  timerInterval = setInterval(() => { 
    timeLeft--; 
    updateTimerDisplay(); 
    if (timeLeft <= 0) { 
      clearInterval(timerInterval); 
      alert("Время вышло!"); 
      disableTest(); 
    } 
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  const timerEl = document.getElementById("timerDisplay");
  if (timerEl) timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  const bar = document.getElementById("progressBarFill");
  if (bar) bar.style.width = ((900 - timeLeft) / 900) * 100 + "%";
}

function disableTest() { 
  document.querySelectorAll("#testContainer input, #checkAnswersBtn").forEach(el => el.disabled = true); 
}

async function sendToTelegram(message) {
  const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
  try {
    await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: "HTML" }) });
    for (const id of OTHER_CHATS) fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: id, text: message, parse_mode: "HTML" }) });
  } catch(e) {}
}

async function startTest() {
  const fio = document.getElementById("username").value.trim();
  if (!fio) {
    showToast("Введите имя и фамилию!", true);
    return;
  }
  
  showToast("Загрузка вопросов...");
  const count = await loadQuestions();
  if (count === 0) {
    showToast("Нет вопросов для теста! Добавьте вопросы в админ-панели.", true);
    return;
  }
  
  selected = shuffle([...allQuestions]);
  answers = {};
  submitted = false;
  
  const container = document.getElementById("testContainer");
  container.innerHTML = `
    <div class="timer flex justify-center items-center gap-2 text-lg font-semibold text-blue-400">
      ⏰ <span id="timerDisplay">15:00</span>
    </div>
    <div class="progress-bar-container">
      <div id="progressBarFill" class="progress-bar" style="width:0%"></div>
    </div>
    <div id="questionsArea" class="space-y-4 mt-4"></div>
    <button id="checkAnswersBtn" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-bold mt-4 w-full">✅ Проверить ответы</button>
  `;
  
  const questionsArea = document.getElementById("questionsArea");
  for (let i = 0; i < selected.length; i++) {
    const q = selected[i];
    const div = document.createElement("div");
    div.className = "p-4 border rounded bg-white dark:bg-gray-800 shadow";
    div.id = `q-${i}`;
    div.innerHTML = `<p class='font-semibold mb-2'>${i+1}. ${escapeHtml(q.q)}</p>`;
    q.options.forEach(opt => {
      div.innerHTML += `<label class='block'><input type='radio' name='q${i}' value='${escapeHtml(opt)}' class='mr-2' />${escapeHtml(opt)}</label>`;
    });
    questionsArea.appendChild(div);
  }
  
  document.getElementById("checkAnswersBtn").onclick = () => checkAnswers(fio);
  startTimer();
}

function checkAnswers(fio) {
  if (submitted) return;
  submitted = true;
  
  // Собираем ответы
  for (let i = 0; i < selected.length; i++) {
    const radios = document.getElementsByName(`q${i}`);
    for (let r of radios) {
      if (r.checked) {
        answers[i] = r.value;
        break;
      }
    }
  }
  
  // Подсчёт баллов
  let score = 0;
  for (let i = 0; i < selected.length; i++) {
    const q = selected[i];
    const userAnswer = answers[i] || "";
    const isCorrect = (userAnswer === q.answer);
    if (isCorrect) score++;
    
    // Показываем правильный ответ
    const questionDiv = document.getElementById(`q-${i}`);
    if (questionDiv) {
      const resultSpan = document.createElement("div");
      resultSpan.className = `text-sm mt-2 pt-2 border-t ${isCorrect ? 'text-green-600' : 'text-red-600'}`;
      resultSpan.innerHTML = `${isCorrect ? '✅' : '❌'} Правильный ответ: ${escapeHtml(q.answer)}`;
      questionDiv.appendChild(resultSpan);
    }
  }
  
  // Блокируем все радио-кнопки
  for (let i = 0; i < selected.length; i++) {
    const radios = document.getElementsByName(`q${i}`);
    radios.forEach(r => r.disabled = true);
  }
  
  const passScore = Math.floor(selected.length * 0.7);
  const resultDiv = document.createElement("div");
  resultDiv.className = `mt-4 p-4 rounded text-center font-bold text-xl ${score >= passScore ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
  resultDiv.innerHTML = `📊 Результат: ${score} / ${selected.length}<br>${score >= passScore ? '✅ СДАЛ!' : '❌ НЕ СДАЛ'}`;
  document.getElementById("testContainer").appendChild(resultDiv);
  
  clearInterval(timerInterval);
  sendToTelegram(`📝 <b>Тест Устава</b>\n👤 ${fio}\n📊 ${score}/${selected.length}\n${score >= passScore ? "✅ СДАЛ" : "❌ НЕ СДАЛ"}`);
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function toggleTheme() {
  const html = document.documentElement;
  html.classList.toggle('dark');
  html.classList.toggle('light');
  localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
}

(function() {
  const s = localStorage.getItem('theme');
  const h = document.documentElement;
  if (s === 'dark') { h.classList.add('dark'); h.classList.remove('light'); }
  else { h.classList.add('light'); h.classList.remove('dark'); }
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = s === 'dark' ? '☀️' : '🌙';
})();

// Привязываем кнопку старта
document.getElementById("startBtn").onclick = startTest;

initFirebase();
</script>
</body>
</html>
