<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тест Устава | Москва ЛАЙВ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: radial-gradient(ellipse at 20% 30%, #0a0a2a, #050510); min-height: 100vh; color: #fff; }
    .btn-neon {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #00d4ff;
      color: #00d4ff;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-neon:hover { background: #00d4ff; color: #050510; box-shadow: 0 0 30px #00d4ff; }
    .btn-neon-green { border-color: #00ff88; color: #00ff88; }
    .btn-neon-green:hover { background: #00ff88; box-shadow: 0 0 30px #00ff88; }
    .glass-card { background: rgba(20, 20, 50, 0.4); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(0, 212, 255, 0.3); padding: 24px; }
    .question-block { background: rgba(20, 20, 50, 0.6); border-radius: 20px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #00d4ff; }
    .timer-box { font-size: 32px; font-weight: bold; text-align: center; padding: 16px; background: rgba(0,0,0,0.5); border-radius: 60px; margin-bottom: 24px; border: 1px solid #00d4ff; color: #00d4ff; }
    .result { text-align: center; padding: 20px; border-radius: 20px; margin-top: 20px; font-weight: bold; }
    .correct { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid #00ff88; }
    .wrong { background: rgba(255, 0, 212, 0.2); color: #ff00d4; border: 1px solid #ff00d4; }
    textarea { width: 100%; padding: 12px; border-radius: 12px; background: rgba(0,0,0,0.5); border: 1px solid #00d4ff; color: white; margin-top: 12px; }
    input[type="radio"] { accent-color: #00d4ff; margin-right: 8px; }
    .hidden { display: none; }
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 40px;
      color: white;
      text-decoration: none;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.2);
      z-index: 100;
    }
    .back-btn:hover { background: rgba(0,212,255,0.3); }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← НА ГЛАВНУЮ</a>

  <div class="glass-card max-w-2xl mx-auto mt-16 p-6 mb-8">
    <div class="text-center mb-6">
      <h1 class="text-4xl font-extrabold" style="text-shadow: 0 0 10px #00d4ff;">📜 ТЕСТ УСТАВА</h1>
      <p class="text-gray-400 mt-2">Проверь знание устава организации</p>
    </div>

    <div id="step1">
      <input type="text" id="username" placeholder="Имя и фамилия" class="w-full p-3 rounded-xl bg-black/50 border border-cyan-500 text-white text-center mb-4">
      <button class="btn-neon w-full" id="startBtn">▶ НАЧАТЬ ТЕСТ</button>
    </div>

    <div id="step2" class="hidden">
      <div class="timer-box" id="timerDisplay">15:00</div>
      <div id="questionsList"></div>
      <button class="btn-neon btn-neon-green w-full mt-6" id="checkBtn">✅ ПРОВЕРИТЬ ОТВЕТЫ</button>
      <div id="resultArea"></div>
    </div>
  </div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCuOIt7wMUrN8vu9RQqivNj9w3CdFitrqE",
  authDomain: "moscow-live-tests.firebaseapp.com",
  projectId: "moscow-live-tests",
  storageBucket: "moscow-live-tests.firebasestorage.app",
  messagingSenderId: "956332293918",
  appId: "1:956332293918:web:e7f66986cca2a30474130f"
};

const TELEGRAM_TOKEN = "7611996960:AAH7uARRG4FS8aM0M5xcK25PMagBOvnSjbQ";
const TELEGRAM_CHAT_ID = "5755169925";
const OTHER_CHATS = ["1360982536", "5329733389", "1880536475", "1302624133", "5337802253", "902249172", "8038255042"];

let db = null;
let allQuestions = [];
let selectedQuestions = [];
let userAnswers = {};
let timerInterval = null;
let timeLeft = 900;
let testActive = false;

firebase.initializeApp(FIREBASE_CONFIG);
db = firebase.database();

async function loadQuestions() {
  try {
    const snapshot = await db.ref('questions/ustavQuestions').once('value');
    const data = snapshot.val();
    if (data && Array.isArray(data)) {
      allQuestions = data.filter(q => q.inTest !== false);
    } else {
      allQuestions = [];
    }
    console.log('Загружено вопросов для Устава:', allQuestions.length);
    return allQuestions.length;
  } catch(e) {
    console.error('Ошибка загрузки:', e);
    return 0;
  }
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

async function startTest() {
  const username = document.getElementById('username').value.trim();
  if (!username) {
    alert('Введите имя и фамилию!');
    return;
  }
  
  const count = await loadQuestions();
  if (count === 0) {
    alert('Нет вопросов для теста! Сначала добавьте вопросы в админ-панели.');
    return;
  }
  
  selectedQuestions = shuffleArray([...allQuestions]);
  userAnswers = {};
  testActive = true;
  timeLeft = 900;
  
  renderQuestions();
  startTimer();
  
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
}

function renderQuestions() {
  const container = document.getElementById('questionsList');
  container.innerHTML = '';
  
  for (let i = 0; i < selectedQuestions.length; i++) {
    const q = selectedQuestions[i];
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `q-${i}`;
    
    let innerHtml = `<div class="font-bold text-lg mb-3">${i+1}. ${escapeHtml(q.q)}</div>`;
    
    if (q.options && Array.isArray(q.options) && q.options.length > 0) {
      innerHtml += q.options.map(opt => `
        <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 cursor-pointer">
          <input type="radio" name="q${i}" value="${escapeHtml(opt)}"> ${escapeHtml(opt)}
        </label>
      `).join('');
    } else {
      innerHtml += `<textarea name="q${i}" rows="3" placeholder="Введите ответ..."></textarea>`;
    }
    
    innerHtml += `<div class="answer-hint hidden mt-3 pt-2 border-t border-cyan-500/30 text-sm" id="hint-${i}"></div>`;
    block.innerHTML = innerHtml;
    container.appendChild(block);
  }
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    if (!testActive) return;
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert('Время вышло!');
      checkAnswers();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  document.getElementById('timerDisplay').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
}

function checkAnswers() {
  if (!testActive) return;
  testActive = false;
  clearInterval(timerInterval);
  
  const username = document.getElementById('username').value.trim();
  
  for (let i = 0; i < selectedQuestions.length; i++) {
    const q = selectedQuestions[i];
    if (q.options && Array.isArray(q.options) && q.options.length > 0) {
      const radios = document.getElementsByName(`q${i}`);
      for (let r of radios) {
        if (r.checked) {
          userAnswers[i] = r.value;
          break;
        }
      }
    } else {
      const textarea = document.querySelector(`textarea[name="q${i}"]`);
      if (textarea) {
        userAnswers[i] = textarea.value;
      }
    }
  }
  
  let correctCount = 0;
  for (let i = 0; i < selectedQuestions.length; i++) {
    const q = selectedQuestions[i];
    const userAnswer = userAnswers[i] || '';
    let isCorrect = false;
    
    if (q.options && Array.isArray(q.options) && q.options.length > 0) {
      isCorrect = (userAnswer === q.answer);
    } else {
      isCorrect = userAnswer.trim().toLowerCase() === (q.answer || '').trim().toLowerCase();
    }
    
    if (isCorrect) correctCount++;
    
    const hintDiv = document.getElementById(`hint-${i}`);
    if (hintDiv) {
      hintDiv.classList.remove('hidden');
      hintDiv.innerHTML = `${isCorrect ? '✅' : '❌'} Правильный ответ: ${escapeHtml(q.answer)}`;
      hintDiv.style.color = isCorrect ? '#00ff88' : '#ff00d4';
    }
    
    const radios = document.getElementsByName(`q${i}`);
    radios.forEach(r => r.disabled = true);
    const textarea = document.querySelector(`textarea[name="q${i}"]`);
    if (textarea) textarea.disabled = true;
  }
  
  const passScore = Math.floor(selectedQuestions.length * 0.7);
  const resultDiv = document.getElementById('resultArea');
  resultDiv.innerHTML = `
    <div class="result ${correctCount >= passScore ? 'correct' : 'wrong'}">
      📊 Результат: ${correctCount} / ${selectedQuestions.length}<br>
      ${correctCount >= passScore ? '✅ СДАЛ! Молодец!' : '❌ НЕ СДАЛ! Иди учить устав!'}
    </div>
  `;
  
  sendToTelegram(`📝 <b>Тест Устава</b>\n👤 ${username}\n📊 ${correctCount}/${selectedQuestions.length}\n${correctCount >= passScore ? "✅ СДАЛ" : "❌ НЕ СДАЛ"}`);
}

async function sendToTelegram(message) {
  const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
  try {
    await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: "HTML" })
    });
    for (const id of OTHER_CHATS) {
      await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: id, text: message, parse_mode: "HTML" })
      });
    }
  } catch(e) { console.error(e); }
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

document.getElementById('startBtn').onclick = startTest;
document.getElementById('checkBtn').onclick = checkAnswers;
</script>
</body>
</html>
