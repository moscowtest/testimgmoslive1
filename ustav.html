<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тест Устава</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    body { background: #f0f2f5; }
    .test-card { max-width: 700px; margin: 40px auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .question-block { background: #f8fafc; border-radius: 16px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #3b82f6; }
    .timer-box { font-size: 28px; font-weight: bold; text-align: center; padding: 12px; background: #1e293b; color: white; border-radius: 16px; margin-bottom: 24px; }
    .btn-start { background: #22c55e; color: white; padding: 12px 32px; border-radius: 40px; font-weight: bold; border: none; cursor: pointer; font-size: 18px; }
    .btn-check { background: #3b82f6; color: white; padding: 12px 24px; border-radius: 40px; font-weight: bold; border: none; cursor: pointer; width: 100%; font-size: 18px; margin-top: 20px; }
    .result { text-align: center; padding: 16px; border-radius: 16px; margin-top: 20px; font-weight: bold; }
    .correct { background: #dcfce7; color: #166534; }
    .wrong { background: #fee2e2; color: #991b1b; }
    .answer-hint { margin-top: 12px; padding-top: 8px; border-top: 1px solid #e2e8f0; font-size: 14px; }
  </style>
</head>
<body>

<div class="test-card" id="app">
  <h1 class="text-2xl font-bold text-center mb-4">📜 Тест по Уставу</h1>
  
  <!-- Шаг 1: Ввод имени и старт -->
  <div id="step1">
    <input type="text" id="username" placeholder="Имя и фамилия" class="w-full p-3 border rounded-xl mb-4 text-center">
    <button class="btn-start w-full" id="startBtn">▶ НАЧАТЬ ТЕСТ</button>
  </div>
  
  <!-- Шаг 2: Тест (изначально скрыт) -->
  <div id="step2" style="display: none;">
    <div class="timer-box" id="timerDisplay">15:00</div>
    <div id="questionsList"></div>
    <button class="btn-check" id="checkBtn">✅ ПРОВЕРИТЬ ОТВЕТЫ</button>
    <div id="resultArea"></div>
  </div>
</div>

<script>
// Firebase конфиг
const firebaseConfig = {
  apiKey: "AIzaSyCuOIt7wMUrN8vu9RQqivNj9w3CdFitrqE",
  authDomain: "moscow-live-tests.firebaseapp.com",
  projectId: "moscow-live-tests",
  storageBucket: "moscow-live-tests.firebasestorage.app",
  messagingSenderId: "956332293918",
  appId: "1:956332293918:web:e7f66986cca2a30474130f"
};

let db = null;
let allQuestions = [];
let selectedQuestions = [];
let userAnswers = {};
let timerInterval = null;
let timeLeft = 900;
let testActive = false;

// Инициализация Firebase
firebase.initializeApp(firebaseConfig);
db = firebase.database();

// Загрузка вопросов из Firebase
async function loadQuestions() {
  const snapshot = await db.ref('questions/ustavQuestions').once('value');
  const data = snapshot.val();
  if (data && Array.isArray(data)) {
    // Фильтруем вопросы, отмеченные для теста
    allQuestions = data.filter(q => q.inTest !== false);
  } else {
    allQuestions = [];
  }
  console.log('Загружено вопросов:', allQuestions.length);
  return allQuestions.length;
}

// Перемешивание массива
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Старт теста
async function startTest() {
  const username = document.getElementById('username').value.trim();
  if (!username) {
    alert('Введите имя и фамилию!');
    return;
  }
  
  // Загружаем вопросы
  const count = await loadQuestions();
  if (count === 0) {
    alert('Нет вопросов для теста! Сначала добавьте вопросы в админ-панели.');
    return;
  }
  
  // Выбираем все вопросы и перемешиваем
  selectedQuestions = shuffleArray([...allQuestions]);
  userAnswers = {};
  testActive = true;
  
  // Отображаем тест
  renderQuestions();
  startTimer();
  
  // Переключаем видимость
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
}

// Отрисовка вопросов
function renderQuestions() {
  const container = document.getElementById('questionsList');
  container.innerHTML = '';
  
  selectedQuestions.forEach((q, idx) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.innerHTML = `
      <div class="font-bold mb-3">${idx+1}. ${escapeHtml(q.q)}</div>
      ${q.options.map(opt => `
        <label class="flex items-center gap-2 mb-2 cursor-pointer">
          <input type="radio" name="q${idx}" value="${escapeHtml(opt)}" class="w-4 h-4">
          <span>${escapeHtml(opt)}</span>
        </label>
      `).join('')}
      <div class="answer-hint" id="hint-${idx}" style="display: none;"></div>
    `;
    container.appendChild(block);
  });
}

// Сбор ответов и проверка
function checkAnswers() {
  if (!testActive) return;
  testActive = false;
  
  // Останавливаем таймер
  if (timerInterval) clearInterval(timerInterval);
  
  // Собираем ответы
  for (let i = 0; i < selectedQuestions.length; i++) {
    const radios = document.getElementsByName(`q${i}`);
    for (let r of radios) {
      if (r.checked) {
        userAnswers[i] = r.value;
        break;
      }
    }
  }
  
  // Подсчёт баллов и показ правильных ответов
  let correctCount = 0;
  for (let i = 0; i < selectedQuestions.length; i++) {
    const q = selectedQuestions[i];
    const userAnswer = userAnswers[i] || '';
    const isCorrect = (userAnswer === q.answer);
    if (isCorrect) correctCount++;
    
    // Показываем правильный ответ
    const hintDiv = document.getElementById(`hint-${i}`);
    if (hintDiv) {
      hintDiv.style.display = 'block';
      hintDiv.innerHTML = `${isCorrect ? '✅' : '❌'} Правильный ответ: ${escapeHtml(q.answer)}`;
      hintDiv.style.color = isCorrect ? '#166534' : '#991b1b';
    }
    
    // Блокируем все радио-кнопки этого вопроса
    const radios = document.getElementsByName(`q${i}`);
    radios.forEach(r => r.disabled = true);
  }
  
  // Результат
  const passScore = Math.floor(selectedQuestions.length * 0.7);
  const resultDiv = document.getElementById('resultArea');
  resultDiv.innerHTML = `
    <div class="result ${correctCount >= passScore ? 'correct' : 'wrong'}">
      📊 Результат: ${correctCount} / ${selectedQuestions.length}<br>
      ${correctCount >= passScore ? '✅ СДАЛ! Молодец!' : '❌ НЕ СДАЛ! Иди учить Устав!'}
    </div>
  `;
}

// Таймер
function startTimer() {
  timeLeft = 900;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    if (!testActive) return;
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert('Время вышло!');
      checkAnswers();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  document.getElementById('timerDisplay').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// Навешиваем обработчики
document.getElementById('startBtn').onclick = startTest;
document.getElementById('checkBtn').onclick = checkAnswers;
</script>

</body>
</html>
